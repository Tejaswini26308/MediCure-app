<!DOCTYPE html>
<html>
<head>
    <title>MediCure Dashboard</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body{
            margin:0;
            font-family:Segoe UI;
            background:#0b1220;
            color:white;
        }

        /* TOP NAV */
        .top-nav{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:15px 25px;
            background:#111827;
            position:sticky;
            top:0;
        }

        .top-nav h1{
            color:#38bdf8;
        }

        .top-nav button{
            background:#2563eb;
            border:none;
            padding:8px 15px;
            border-radius:10px;
            color:white;
        }

        /* HERO */
        .hero{
            padding:20px;
            background:linear-gradient(135deg,#1d4ed8,#06b6d4);
            margin:15px;
            border-radius:20px;
        }

        /* QUICK CARDS */
        .grid{
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:15px;
            padding:15px;
        }

        .card{
            background:#111827;
            padding:15px;
            border-radius:15px;
            text-align:center;
            transition:0.3s;
            cursor:pointer;
        }

        .card:hover{
            transform:scale(1.05);
            background:#1f2937;
        }

        .card i{
            font-size:25px;
            color:#38bdf8;
        }

        /* SERVICES */
        .services{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
            gap:15px;
            padding:15px;
        }

        /* LOCATION */
        .location{
            margin:15px;
            background:#111827;
            padding:20px;
            border-radius:15px;
        }

        select,button{
            padding:10px;
            border-radius:10px;
            margin-top:10px;
        }

        button{
            background:#2563eb;
            border:none;
            color:white;
        }

        /* FLOAT CHATBOT */
        .chatbot-btn{
            position:fixed;
            bottom:20px;
            left:20px;
            background:#2563eb;
            padding:15px;
            border-radius:50%;
            cursor:pointer;
            font-size:18px;
        }

        /* SOS */
        .sos{
            position:fixed;
            bottom:20px;
            right:20px;
            background:red;
            padding:15px;
            border-radius:50%;
            cursor:pointer;
        }

        /* RESULT BOX */
        .result{
            margin-top:10px;
        }

    </style>
</head>

<body>

<!-- NAV -->
<div class="top-nav">
    <h1>🏥 MediCure AI</h1>
    <a href="/"><button>Home</button></a>
</div>

<!-- HERO -->
<div class="hero">
    <h2>Smart Healthcare System</h2>
    <p>Human + Pet AI Health Assistant Platform</p>
</div>

<!-- QUICK HEALTH -->
<div class="grid">

    <div class="card">
        <i class="fa-solid fa-heart-pulse"></i>
        <p>Heart Rate</p>
    </div>

    <div class="card">
        <i class="fa-solid fa-stethoscope"></i>
        <p>Pulse</p>
    </div>

    <div class="card">
        <i class="fa-solid fa-person-running"></i>
        <p>Speed</p>
    </div>

</div>

<!-- SERVICES -->
<h3 style="padding-left:15px;">Services</h3>

<div class="services">

    <a href="/human"><div class="card">Human Care</div></a>
    <a href="/vet"><div class="card">Pet Care</div></a>
    <a href="/admin"><div class="card">Admin</div></a>
    <a href="/insurance"><div class="card">Insurance</div></a>
    <a href="/pharmacy"><div class="card">Pharmacy</div></a>

</div>

<!-- LOCATION -->
<div class="location">

    <h2>Find Hospitals Near You</h2>

    <select id="city">
        <option value="">Select City</option>
        <option value="hyderabad">Hyderabad</option>
        <option value="vijayawada">Vijayawada</option>
    </select>

    <button onclick="searchHospitals()">Search</button>

    <div id="result" class="result"></div>

</div>

<!-- CHATBOT (HUMAN + PET AI) -->
<div class="chatbot-btn" onclick="openChat()">
💬
</div>

<!-- SOS -->
<div class="sos" onclick="alert('Emergency: Call 108 Ambulance')">
🚨
</div>

<script>
function openChat(){
    window.location.href = "/chatbot";
}

function searchHospitals(){
    let city = document.getElementById("city").value;
    let res = document.getElementById("result");

    if(!city){
        res.innerHTML = "Please select city";
        return;
    }

    res.innerHTML = "<p>Loading hospitals...</p>";

    setTimeout(()=>{
        res.innerHTML = `
            <div style="background:#1f2937;padding:10px;border-radius:10px;margin-top:10px;">
                <h4>Nearby Hospitals in ${city}</h4>
                <p>✔ Apollo</p>
                <p>✔ Government Hospital</p>
                <p>✔ Private Clinics</p>
            </div>
        `;
    },1000);
}
</script>

</body>
</html>
