<!DOCTYPE html>
<html>
<head>
    <title>MediCure Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="dashboard-page">

<!-- NAVBAR -->
<div class="premium-nav">
    <h2>🏥 MediCure</h2>

    <div class="nav-icons">
        <a href="/chatbot"><i class="fa-solid fa-robot"></i></a>
        <a href="/"><i class="fa-solid fa-house"></i></a>
    </div>
</div>

<!-- HERO -->
<div class="premium-hero">
    <div>
        <h1>Your Health, One Smart App</h1>
        <p>Book appointments • Find hospitals • Track health • Pet care</p>
    </div>

    <div class="hero-icon">
        <i class="fa-solid fa-heart-pulse"></i>
    </div>
</div>

<!-- QUICK ACTIONS -->
<h2 class="section-title">Health Tracking</h2>

<div class="premium-grid">

    <a href="/heart-rate" class="premium-card red">
        <i class="fa-solid fa-heart-pulse"></i>
        <h3>Heart Monitor</h3>
    </a>

    <a href="/pulse" class="premium-card blue">
        <i class="fa-solid fa-wave-square"></i>
        <h3>Pulse Monitor</h3>
    </a>

    <a href="/speed" class="premium-card green">
        <i class="fa-solid fa-person-running"></i>
        <h3>Fitness Speed</h3>
    </a>

</div>

<!-- SERVICES -->
<h2 class="section-title">Medical Services</h2>

<div class="service-grid">

    <a href="/human" class="service-card">
        <i class="fa-solid fa-user-doctor"></i>
        <p>Human Care</p>
    </a>

    <a href="/vet" class="service-card">
        <i class="fa-solid fa-paw"></i>
        <p>Pet Care</p>
    </a>

    <a href="/insurance" class="service-card">
        <i class="fa-solid fa-shield-heart"></i>
        <p>Insurance</p>
    </a>

    <a href="/pharmacy" class="service-card">
        <i class="fa-solid fa-pills"></i>
        <p>Pharmacy</p>
    </a>

</div>

<!-- HOSPITAL FINDER -->
<div class="hospital-box">
    <h2>Find Nearby Hospitals</h2>

    <select id="citySelect">
        <option value="">Select City</option>
        <option value="vijayawada">Vijayawada</option>
        <option value="hyderabad">Hyderabad</option>
        <option value="visakhapatnam">Visakhapatnam</option>
    </select>

    <button onclick="findHospitals()">Search</button>

    <div id="hospitalResults"></div>
</div>

<!-- SOS -->
<div class="sos-float" onclick="showSOS()">🚨</div>

<script>
function showSOS(){
    alert("Ambulance: 108\nPolice:100\nFire:101");
}

function findHospitals() {
    let city = document.getElementById("citySelect").value;
    let result = document.getElementById("hospitalResults");

    let hospitals = {
        vijayawada:["Andhra Hospital","Ramesh Hospital"],
        hyderabad:["Apollo Hospital","Yashoda Hospital"],
        visakhapatnam:["KIMS Hospital","Seven Hills Hospital"]
    };

    if(city===""){
        result.innerHTML="<p>Select city first</p>";
        return;
    }

    let output="";
    hospitals[city].forEach(h=>{
        output += `
        <div class="hospital-card">
            <h4>${h}</h4>
            <p>24/7 Available</p>
        </div>`;
    });

    result.innerHTML=output;
}
</script>

</body>
</html>
