<!DOCTYPE html>
<html>
<head>
    <title>MediCure Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="dashboard-page">

<div class="top-bar">
    <h2>MediCure</h2>

    <div class="top-icons">
        <a href="/chatbot"><i class="fa-solid fa-robot"></i></a>
        <a href="/"><i class="fa-solid fa-house"></i></a>
    </div>
</div>

<div class="hero-banner">
    <div>
        <h1>Your Digital Healthcare Partner</h1>
        <p>Appointments • Reports • Pet Care • Pharmacy • Insurance</p>
    </div>

    <i class="fa-solid fa-heart-pulse hero-heart"></i>
</div>

<h2 class="section-title">Health Monitoring</h2>

<div class="health-grid">
    <a href="/heart-rate" class="health-card">
        <i class="fa-solid fa-heart-pulse"></i>
        <h3>Heart Monitor</h3>
    </a>

    <a href="/pulse" class="health-card">
        <i class="fa-solid fa-wave-square"></i>
        <h3>Pulse Monitor</h3>
    </a>

    <a href="/speed" class="health-card">
        <i class="fa-solid fa-shoe-prints"></i>
        <h3>Fitness Tracker</h3>
    </a>
</div>

<h2 class="section-title">Services</h2>

<div class="service-grid">
    <a href="/human" class="service-card">
        <i class="fa-solid fa-user-doctor"></i>
        <p>Human Care</p>
    </a>

    <a href="/vet" class="service-card">
        <i class="fa-solid fa-paw"></i>
        <p>Pet Care</p>
    </a>

    <a href="/insurance" class="service-card">
        <i class="fa-solid fa-shield-heart"></i>
        <p>Insurance</p>
    </a>

    <a href="/pharmacy" class="service-card">
        <i class="fa-solid fa-pills"></i>
        <p>Pharmacy</p>
    </a>
</div>

<script>
function findHospitals() {
    let city = document.getElementById("citySelect").value;
    let result = document.getElementById("hospitalResults");

    let hospitals = {
        vijayawada: [
            {
                name: "Andhra Hospital",
                map: "https://www.google.com/maps/search/Andhra+Hospital+Vijayawada"
            },
            {
                name: "Ramesh Hospital",
                map: "https://www.google.com/maps/search/Ramesh+Hospital+Vijayawada"
            },
            {
                name: "Pet Care Clinic",
                map: "https://www.google.com/maps/search/Pet+Clinic+Vijayawada"
            }
        ],

        hyderabad: [
            {
                name: "Apollo Hospital",
                map: "https://www.google.com/maps/search/Apollo+Hospital+Hyderabad"
            },
            {
                name: "Yashoda Hospital",
                map: "https://www.google.com/maps/search/Yashoda+Hospital+Hyderabad"
            },
            {
                name: "Pet Vet Center",
                map: "https://www.google.com/maps/search/Pet+Clinic+Hyderabad"
            }
        ],

        visakhapatnam: [
            {
                name: "KIMS Hospital",
                map: "https://www.google.com/maps/search/KIMS+Hospital+Vizag"
            },
            {
                name: "Seven Hills Hospital",
                map: "https://www.google.com/maps/search/Seven+Hills+Hospital+Vizag"
            },
            {
                name: "Animal Care Hub",
                map: "https://www.google.com/maps/search/Veterinary+Hospital+Vizag"
            }
        ]
    };

    if(city === ""){
        result.innerHTML = "<p>Please select city first</p>";
        return;
    }

    let output = "";

    hospitals[city].forEach(h => {
        output += `
        <div class="hospital-card">
            <h3>${h.name}</h3>
            <p>24/7 Available</p>

            <a href="${h.map}" target="_blank">
                <button>Open in Google Maps</button>
            </a>
        </div>
        `;
    });

    result.innerHTML = output;
}
</script>

<div class="chat-float">
    <a href="/chatbot">
        <i class="fa-solid fa-comments"></i>
    </a>
</div>

<div class="sos-float" onclick="showSOS()">SOS</div>

<script>
function showSOS(){
    alert("Emergency Numbers:\nAmbulance:108\nPolice:100");
}

function findHospitals(){
    let city=document.getElementById("citySelect").value;
    let result=document.getElementById("hospitalResults");

    let hospitals={
        hyderabad:["Apollo Hospital","Yashoda Hospital"],
        vijayawada:["Ramesh Hospital","Andhra Hospital"],
        visakhapatnam:["KIMS Hospital","Seven Hills"]
    };

    if(city===""){
        result.innerHTML="Select city first";
        return;
    }

    let output="";

    hospitals[city].forEach(h=>{
        output+=`
        <div class="hospital-card">
            <h4>${h}</h4>
            <p>24/7 Available</p>
        </div>`;
    });

    result.innerHTML=output;
}
</script>

</body>
</html>
