<!DOCTYPE html>
<html>
<head>
    <title>Pet Symptom Checker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<a href="/vet" class="back-btn">← Back</a>

<div class="dashboard-container">

    <div style="max-width:500px; margin:auto; text-align:center;">

        <h1>🐾 Pet Symptom Checker</h1>

        <p style="color:gray;">
            Enter symptoms to get instant possible health suggestions for your pet.
        </p>

        <!-- FORM -->
        <form id="symptomForm">

            <input type="text"
                   id="symptomInput"
                   placeholder="Enter pet symptoms (e.g., vomiting, fever)"
                   required
                   style="width:90%; padding:12px; margin:10px 0; border-radius:10px; border:1px solid #ccc;">

            <button type="submit"
                    style="width:95%; padding:12px; border:none; border-radius:10px; background:#2563eb; color:white;">
                Check Symptoms
            </button>

        </form>

        <!-- LOADING -->
        <div id="loading" style="display:none; margin-top:20px;">
            <div style="
                width:50px;
                height:50px;
                border:5px solid #ddd;
                border-top:5px solid #2563eb;
                border-radius:50%;
                margin:auto;
                animation: spin 1s linear infinite;">
            </div>
            <p>Analyzing symptoms...</p>
        </div>

        <!-- RESULT BOX -->
        <div id="resultBox" style="
            display:none;
            margin-top:20px;
            padding:15px;
            border-radius:12px;
            background:#f1f5f9;
            text-align:left;">
        </div>

    </div>

</div>

<style>
@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
</style>

<script>
document.getElementById("symptomForm").addEventListener("submit", function(e){
    e.preventDefault();

    let symptom = document.getElementById("symptomInput").value.toLowerCase();

    document.getElementById("loading").style.display = "block";
    document.getElementById("resultBox").style.display = "none";

    setTimeout(() => {

        document.getElementById("loading").style.display = "none";

        let result = "";

        if(symptom.includes("vomiting")){
            result = "🐶 Possible issue: Digestive problem. Give light food and water.";
        }
        else if(symptom.includes("fever")){
            result = "🐶 Possible issue: Infection or viral fever. Monitor temperature.";
        }
        else if(symptom.includes("skin")){
            result = "🐶 Possible issue: Skin allergy or infection.";
        }
        else if(symptom.includes("cough")){
            result = "🐶 Possible issue: Respiratory infection.";
        }
        else{
            result = "🐶 Advice: Please consult a veterinarian for proper diagnosis.";
        }

        document.getElementById("resultBox").style.display = "block";
        document.getElementById("resultBox").innerHTML = "<h3>Result:</h3><p>" + result + "</p>";

    }, 1500);
});
</script>

</body>
</html>
