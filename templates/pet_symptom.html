<!DOCTYPE html>
<html>
<head>
    <title>Pet Symptom Checker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<a href="/vet" class="back-btn">← Back</a>

<div class="dashboard-container">

    <div style="max-width:500px; margin:auto; text-align:center;">

        <h1>🐾 Pet Symptom Checker</h1>

        <!-- DESCRIPTION -->
        <p style="color:gray;">
            This tool helps you understand possible pet health issues based on symptoms.
            It is not a replacement for a veterinarian but gives quick guidance.
        </p>

        <!-- FORM -->
        <form method="POST" onsubmit="showLoading(event)">

            <input type="text"
                   id="symptomInput"
                   name="symptom"
                   placeholder="Enter pet symptoms (e.g., vomiting, fever)"
                   required
                   style="width:90%; padding:12px; margin:10px 0; border-radius:10px; border:1px solid #ccc;">

            <button type="submit"
                    style="width:95%; padding:12px; border:none; border-radius:10px; background:#2563eb; color:white;">
                Check Symptoms
            </button>

        </form>

        <!-- LOADING CIRCLE -->
        <div id="loading" style="display:none; margin-top:20px;">
            <div style="
                width:50px;
                height:50px;
                border:5px solid #ddd;
                border-top:5px solid #2563eb;
                border-radius:50%;
                margin:auto;
                animation: spin 1s linear infinite;">
            </div>
            <p>Checking symptoms...</p>
        </div>

    </div>

</div>

<style>
@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
</style>

<script>
function showLoading(event){
    event.preventDefault();

    document.querySelector("form").style.display = "none";
    document.getElementById("loading").style.display = "block";

    setTimeout(() => {
        document.querySelector("form").submit();
    }, 1500);
}
</script>

</body>
</html>
