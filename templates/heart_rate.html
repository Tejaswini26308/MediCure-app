<!DOCTYPE html>
<html>
<head>
    <title>Heart Monitor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="heart-page">

<a href="/dashboard" class="back-btn">← Back</a>

<div class="heart-wrapper">

    <div class="heart-left-panel">
        <img src="{{ url_for('static', filename='heart.png') }}" class="heart-img">
    </div>

    <div class="heart-right-panel">
        <h1>Live Heart Monitor</h1>

        <div class="bpm-card">
            <h2>72</h2>
            <p>BPM</p>
        </div>

        <div class="ecg-monitor">
    <svg viewBox="0 0 1000 200" class="ecg-svg">
        <polyline 
            fill="none"
            stroke="#00ff88"
            stroke-width="6"
            points="
            0,100 
            80,100 
            120,60 
            160,140 
            200,40 
            240,100 
            320,100

            400,100 
            480,100 
            520,60 
            560,140 
            600,40 
            640,100 
            720,100

            800,100 
            880,100 
            920,60 
            960,140 
            1000,100
            "
        />
    </svg>
</div>

        <div class="health-info-grid">
            <div class="info-box">
                <h3>120/80</h3>
                <p>Blood Pressure</p>
            </div>

            <div class="info-box">
                <h3>98%</h3>
                <p>Oxygen</p>
            </div>

            <div class="info-box">
                <h3>Normal</h3>
                <p>Status</p>
            </div>
        </div>
    </div>

</div>

</body>
</html>
