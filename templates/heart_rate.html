<!DOCTYPE html>
<html>
<head>
    <title>Heart Monitor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="heart-page">

<a href="/dashboard" class="back-btn">← Back</a>

<div class="heart-container">

    <img src="{{ url_for('static', filename='heart.png') }}" class="heart-img">

    <div class="heart-box">

        <div class="live-bpm">72 BPM</div>

        <div class="ecg-line">

        <div class="mini-stats">

            <div>Oxygen: 98%</div>
            <div>Status: Normal</div>
        </div>
    </div>

</div>

</body>
</html>
