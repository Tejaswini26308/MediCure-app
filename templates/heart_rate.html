<!DOCTYPE html>
<html>
<head>
    <title>Heart Monitor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="heart-monitor-page">

<a href="/dashboard" class="back-btn">⬅ Back</a>

<div class="heart-dashboard">

    <!-- Left Side Heart -->
    <div class="heart-left">
        <div class="heart-shape"></div>
    </div>

    <!-- Right Side Monitor -->
    <div class="heart-right">

        <h1>Live Heart Monitor</h1>

        <div class="bpm-box">
            <h2>72</h2>
            <p>BPM</p>
        </div>

        <!-- ECG LINE -->
        <div class="ecg-container">
            <svg class="ecg-svg" viewBox="0 0 800 200">
                <polyline
                    fill="none"
                    stroke="#00ffcc"
                    stroke-width="6"
                    points="
                    0,100
                    80,100
                    100,40
                    120,160
                    140,30
                    170,100
                    250,100
                    270,60
                    290,150
                    320,50
                    350,100
                    800,100
                    "
                />
            </svg>
        </div>

        <div class="health-stats">
            <div class="stat-card">
                <h3>120/80</h3>
                <p>BP</p>
            </div>

            <div class="stat-card">
                <h3>98%</h3>
                <p>Oxygen</p>
            </div>

            <div class="stat-card">
                <h3>Normal</h3>
                <p>Status</p>
            </div>
        </div>

    </div>

</div>

</body>
</html>
