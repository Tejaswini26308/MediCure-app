<!DOCTYPE html>
<html>
<head>
    <title>Heart Monitor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="heart-monitor-page">

<a href="/dashboard" class="back-btn">⬅ Back</a>

<div class="heart-dashboard">

    <!-- Left Side Heart -->
    <div class="heart-left">
        <img src="{{ url_for('static', filename='heart.gif') }}" 
             alt="Heart"
             class="real-heart">
    </div>

    <!-- Right Side Monitor -->
    <div class="heart-right">

        <h1>Heart Rate Monitor</h1>

        <div class="ecg-container">
            <div class="ecg-line"></div>
        </div>

        <div class="bpm-box">
            <h2>72</h2>
            <p>BPM</p>
        </div>

        <div class="health-stats">
            <div class="stat-card">
                <h3>120/80</h3>
                <p>Blood Pressure</p>
            </div>

            <div class="stat-card">
                <h3>98%</h3>
                <p>Oxygen Level</p>
            </div>

            <div class="stat-card">
                <h3>Normal</h3>
                <p>Status</p>
            </div>
        </div>

    </div>

</div>

</body>
</html>
