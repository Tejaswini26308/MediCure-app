<!DOCTYPE html>
<html>
<head>
    <title>Vaccination Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<a href="/vet" class="back-btn">← Back</a>

<div class="dashboard-container">

    <!-- HEADER -->
    <div style="text-align:center; max-width:600px; margin:auto;">

        <h1>💉 Pet Vaccination Tracker</h1>

        <p style="color:gray;">
            Track your pet’s upcoming vaccinations and never miss a health schedule.
        </p>

    </div>

    <!-- INFO CARDS -->
    <div class="card-container">

        <div class="card">
            <h3>📅 Smart Reminders</h3>
            <p>Get vaccination alerts on time</p>
        </div>

        <div class="card">
            <h3>🐾 Pet Safety</h3>
            <p>Keep your pet protected from diseases</p>
        </div>

        <div class="card">
            <h3>🩺 Vet Recommended</h3>
            <p>Follow standard medical schedule</p>
        </div>

    </div>

    <!-- FORM CARD -->
    <div style="
        max-width:450px;
        margin:30px auto;
        background:white;
        padding:20px;
        border-radius:15px;
        box-shadow:0 5px 20px rgba(0,0,0,0.08);
        text-align:center;
    ">

        <h3>➕ Add Vaccination Reminder</h3>

        <form method="POST">

            <input type="text"
                   name="pet_name"
                   placeholder="Enter Pet Name"
                   required
                   style="width:90%; padding:12px; margin:10px 0; border-radius:10px; border:1px solid #ccc;">

            <input type="date"
                   name="vaccine_date"
                   required
                   style="width:90%; padding:12px; margin:10px 0; border-radius:10px; border:1px solid #ccc;">

            <button type="submit"
                    style="
                        width:95%;
                        padding:12px;
                        border:none;
                        border-radius:10px;
                        background:#f59e0b;
                        color:white;
                        font-weight:bold;
                        cursor:pointer;
                    ">
                Set Reminder
            </button>

        </form>

    </div>

</div>

</body>
</html>
