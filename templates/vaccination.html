<!DOCTYPE html>
<html>
<head>
    <title>Vaccination Reminder</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<a href="/vet" class="back-btn">← Back</a>

<div class="dashboard-container">
    <h1>Pet Vaccination Reminder</h1>

    <form method="POST">

        <input type="text"
               name="pet_name"
               placeholder="Enter Pet Name"
               required><br><br>

        <input type="date"
               name="vaccine_date"
               required><br><br>

        <button type="submit">Set Reminder</button>

    </form>

</div>

</body>
</html>
