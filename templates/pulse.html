<!DOCTYPE html>
<html>
<head>
    <title>Pulse Monitor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="pulse-page">

<div class="pulse-wrapper">

    <div class="pulse-ring">
        <div class="pulse-inner">
            <h2>82</h2>
            <p>BPM</p>
        </div>
    </div>

    <div class="pulse-chart">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>

    <div class="pulse-stats">
        <div class="pulse-card">Stress: Low</div>
        <div class="pulse-card">Oxygen: 97%</div>
        <div class="pulse-card">Recovery: Good</div>
    </div>

</div>

</body>
</html>
