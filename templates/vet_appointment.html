<!DOCTYPE html>
<html>
<head>
    <title>Vet Appointment</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<a href="/vet" class="back-btn">← Back</a>

<div class="dashboard-container">

    <!-- TITLE -->
    <div style="text-align:center; max-width:600px; margin:auto;">
        <h1>🐾 Book Vet Appointment</h1>
        <p style="color:gray;">
            Choose a doctor, select date & time, and confirm your pet’s appointment instantly.
        </p>
    </div>

    <!-- DOCTOR CARDS -->
    <h3 style="text-align:center; margin-top:25px;">👨‍⚕️ Available Veterinarians</h3>

    <div class="card-container">

        <div class="card">
            <h3>Dr. Arjun</h3>
            <p>Pet Surgeon</p>
        </div>

        <div class="card">
            <h3>Dr. Kavya</h3>
            <p>Animal Skin Specialist</p>
        </div>

        <div class="card">
            <h3>Dr. Ramesh</h3>
            <p>General Vet Expert</p>
        </div>

    </div>

    <!-- BOOKING FORM -->
    <div style="
        max-width:500px;
        margin:30px auto;
        background:white;
        padding:20px;
        border-radius:15px;
        box-shadow:0 5px 20px rgba(0,0,0,0.08);
        text-align:center;
    ">

        <h3>📅 Book Appointment</h3>

        <form method="POST">

            <input type="text"
                   name="pet_name"
                   placeholder="Enter Pet Name"
                   required
                   style="width:90%; padding:12px; margin:10px 0; border-radius:10px; border:1px solid #ccc;">

            <select name="doctor"
                    required
                    style="width:95%; padding:12px; margin:10px 0; border-radius:10px; border:1px solid #ccc;">

                <option>General Vet</option>
                <option>Dog Specialist</option>
                <option>Cat Specialist</option>
            </select>

            <input type="date"
                   name="date"
                   required
                   style="width:90%; padding:12px; margin:10px 0; border-radius:10px; border:1px solid #ccc;">

            <input type="time"
                   name="time"
                   required
                   style="width:90%; padding:12px; margin:10px 0; border-radius:10px; border:1px solid #ccc;">

            <button type="submit"
                    style="
                        width:95%;
                        padding:12px;
                        border:none;
                        border-radius:10px;
                        background:#16a34a;
                        color:white;
                        font-weight:bold;
                        cursor:pointer;
                        margin-top:10px;
                    ">
                Confirm Appointment
            </button>

        </form>

    </div>

</div>

</body>
</html>
