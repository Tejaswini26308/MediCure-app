<!DOCTYPE html>
<html>
<head>
    <title>Vet Appointment</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<a href="/vet" class="back-btn">← Back</a>

<div class="dashboard-container">
    <h1>Book Vet Appointment</h1>

    <form method="POST">

        <input type="text"
               name="pet_name"
               placeholder="Enter Pet Name"
               required><br><br>

        <select name="doctor" required>
            <option>General Vet</option>
            <option>Dog Specialist</option>
            <option>Cat Specialist</option>
        </select><br><br>

        <input type="date" name="date" required><br><br>

        <input type="time" name="time" required><br><br>

        <button type="submit">Book Appointment</button>

    </form>

</div>

</body>
</html>

<h2>Available Veterinarians</h2>

<div class="card-container">

    <div class="card">
        <h3>Dr. Arjun</h3>
        <p>Pet Surgeon</p>
    </div>

    <div class="card">
        <h3>Dr. Kavya</h3>
        <p>Animal Skin Specialist</p>
    </div>

</div>
