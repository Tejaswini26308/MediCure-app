<!DOCTYPE html>
<html>
<head>
    <title>Speed Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="tracker-page">

<a href="/dashboard" class="back-btn">⬅ Back</a>

<div class="watch-container">
    <h1>🏃 Speed Tracker</h1>

    <div class="circle-box">
        <h2>12</h2>
        <p>KM/H</p>
    </div>

    <marquee>🏃 Running... Calories Burned: 220 🔥 Steps: 5400</marquee>
</div>
<div class="run-dashboard">

    <div class="run-header">
        <h2>🏃 Live Running Tracker</h2>
        <p>Real-time performance analytics</p>
    </div>

    <!-- RUN ANIMATION -->
    <div class="run-track">
        <div class="runner">🏃‍♂️</div>
        <div class="track-line"></div>
    </div>

    <!-- STATS -->
    <div class="run-stats">

        <div class="stat">
            <h3 id="speed">12.5</h3>
            <p>Speed (km/h)</p>
        </div>

        <div class="stat">
            <h3 id="time">00:45</h3>
            <p>Time</p>
        </div>

        <div class="stat">
            <h3 id="distance">1.2</h3>
            <p>Distance (km)</p>
        </div>

        <div class="stat">
            <h3 id="steps">1200</h3>
            <p>Steps</p>
        </div>

    </div>

    <!-- GRAPH -->
    <div class="graph">
        <div class="bar b1"></div>
        <div class="bar b2"></div>
        <div class="bar b3"></div>
        <div class="bar b4"></div>
        <div class="bar b5"></div>
    </div>

</div>

</body>
</html>
