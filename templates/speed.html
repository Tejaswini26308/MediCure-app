<!DOCTYPE html>
<html>
<head>
    <title>Fitness Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="speed-page">

<a href="/dashboard" class="back-btn">← Back</a>

<div class="fitness-wrapper">

    <h1>Fitness Tracking</h1>

    <div class="runner-track">
        <div class="track-line"></div>
        <div class="runner-icon">🏃‍♂️</div>
    </div>

    <div class="fitness-grid">

        <div class="fitness-card">
            <h2>14 KM/H</h2>
            <p>Speed</p>
        </div>

        <div class="fitness-card">
            <h2>5400</h2>
            <p>Steps</p>
        </div>

        <div class="fitness-card">
            <h2>220</h2>
            <p>Calories</p>
        </div>

        <div class="fitness-card">
            <h2>5.2 KM</h2>
            <p>Distance</p>
        </div>

    </div>

</div>

</body>
</html>
