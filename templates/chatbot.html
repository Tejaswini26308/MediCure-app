<!DOCTYPE html>
<html>
<head>
    <title>MediCure Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<a href="/dashboard" class="back-btn">← Back</a>

<div class="login-container">
    <h1>AI Health Chatbot</h1>
    <p>Ask about symptoms, remedies, or pet health issues</p>

    <form action="/chatbot_response" method="POST">
        <input 
            type="text" 
            name="message" 
            placeholder="Type your health question..." 
            required
        >
        <br><br>

        <button type="submit">Ask Chatbot</button>
    </form>
</div>

</body>
</html>
